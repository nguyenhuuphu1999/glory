version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: glory-postgres
    environment:
      POSTGRES_DB: glory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: